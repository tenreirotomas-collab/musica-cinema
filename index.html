<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Meu Arquivo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent-music: #c8a96e;
    --accent-film: #7eb8c8;
    --text: #e8e4dc;
    --text-dim: #7a7570;
    --done: #4a6741;
    --done-text: #8fbf84;
    --tag-bg: #252525;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .view { display: none; }
  .view.active { display: block; }
  #view-detail { display: none; flex-direction: column; min-height: 100vh; }
  #view-detail.active { display: flex; }

  /* ============ HEADER ============ */
  header { padding: 40px 40px 0; border-bottom: 1px solid var(--border); }

  .header-top { display: flex; align-items: baseline; gap: 16px; margin-bottom: 32px; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem; font-weight: 400;
    letter-spacing: -0.02em; color: var(--text);
  }

  .header-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem; color: var(--text-dim);
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  .tabs { display: flex; gap: 0; }

  .tab {
    padding: 14px 32px; cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-dim); border-bottom: 2px solid transparent;
    transition: all 0.2s; user-select: none; background: none;
    border-top: none; border-left: none; border-right: none;
    display: flex; align-items: center; gap: 8px;
  }
  .tab:hover { color: var(--text); }
  .tab.active-music { color: var(--accent-music); border-bottom-color: var(--accent-music); }
  .tab.active-film  { color: var(--accent-film);  border-bottom-color: var(--accent-film); }
  .tab-count { font-size: 0.65rem; opacity: 0.7; }

  /* ============ MAIN ============ */
  main { padding: 32px 40px; max-width: 1100px; }

  .controls { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; align-items: center; }

  .search-box {
    flex: 1; min-width: 200px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 16px;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    outline: none; transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--text-dim); }
  .search-box::placeholder { color: var(--text-dim); }

  .filter-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim); padding: 10px 16px;
    font-family: 'DM Mono', monospace; font-size: 0.7rem;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--surface2); color: var(--text); border-color: var(--text-dim);
  }

  .add-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); padding: 10px 20px;
    font-family: 'DM Mono', monospace; font-size: 0.7rem;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s; margin-left: auto;
  }
  .add-btn:hover { border-color: var(--accent-music); color: var(--accent-music); }
  .add-btn.film-mode:hover { border-color: var(--accent-film); color: var(--accent-film); }

  .stats-bar {
    display: flex; gap: 24px; margin-bottom: 24px;
    padding-bottom: 20px; border-bottom: 1px solid var(--border); align-items: center;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 1.6rem; line-height: 1; font-weight: 700; }
  .stat-num.music { color: var(--accent-music); }
  .stat-num.film  { color: var(--accent-film); }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); }
  .progress-bar { flex: 1; height: 3px; background: var(--border); overflow: hidden; }
  .progress-fill { height: 100%; transition: width 0.4s ease; }
  .progress-fill.music { background: var(--accent-music); }
  .progress-fill.film  { background: var(--accent-film); }

  .decade-section { margin-bottom: 36px; }
  .decade-header { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; cursor: pointer; user-select: none; }
  .decade-title { font-family: 'Playfair Display', serif; font-size: 0.85rem; font-style: italic; color: var(--text-dim); letter-spacing: 0.05em; }
  .decade-line { flex: 1; height: 1px; background: var(--border); }
  .decade-badge { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.08em; }
  .decade-toggle { font-size: 0.7rem; color: var(--text-dim); transition: transform 0.2s; }
  .decade-toggle.collapsed { transform: rotate(-90deg); }

  .items-grid { display: flex; flex-direction: column; gap: 2px; }

  .item-row {
    display: flex; align-items: center;
    padding: 12px 14px; background: var(--surface);
    border: 1px solid transparent; transition: all 0.15s; cursor: pointer;
  }
  .item-row:hover { border-color: var(--border); background: var(--surface2); }
  .item-row.done { opacity: 0.6; }
  .item-row.done .item-title { text-decoration: line-through; color: var(--text-dim); }
  .item-row.done .item-artist { color: var(--text-dim); }

  .check-area { width: 36px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .check-circle { width: 20px; height: 20px; border: 1.5px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .item-row:hover .check-circle { border-color: var(--text-dim); }
  .item-row.done .check-circle { background: var(--done); border-color: var(--done); }
  .checkmark { display: none; color: var(--done-text); font-size: 11px; font-weight: bold; }
  .item-row.done .checkmark { display: block; }

  .item-content { flex: 1; min-width: 0; padding: 0 12px; }
  .item-title { font-size: 0.9rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-artist { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'DM Mono', monospace; letter-spacing: 0.02em; }

  .item-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .rating-display { font-size: 0.7rem; color: var(--accent-music); letter-spacing: 0.02em; white-space: nowrap; }
  .rating-display.film { color: var(--accent-film); }

  .media-type { font-family: 'DM Mono', monospace; font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 7px; border: 1px solid; flex-shrink: 0; }
  .media-type.filme { color: var(--accent-film); border-color: var(--accent-film); opacity: 0.7; }
  .media-type.serie { color: #b87ec8; border-color: #b87ec8; opacity: 0.7; }
  .media-type.curta { color: #c8b17e; border-color: #c8b17e; opacity: 0.7; }

  .item-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
  .item-row:hover .item-actions { opacity: 1; }

  .action-btn {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    padding: 5px 9px; font-size: 0.65rem; font-family: 'DM Mono', monospace;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .action-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--text-dim); }
  .action-btn.delete:hover { border-color: #7a3535; color: #c47070; background: #1a1010; }

  /* ============ DETAIL VIEW ============ */
  .detail-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }

  .back-btn {
    background: none; border: none; color: var(--text-dim);
    font-size: 1.4rem; cursor: pointer; padding: 8px 16px 8px 0;
    transition: color 0.2s; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .back-btn:hover { color: var(--text); }

  .detail-header-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-dim);
  }

  .detail-body {
    flex: 1; padding: 52px 28px 48px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }

  .detail-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 20px;
  }

  .detail-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; font-weight: 400; line-height: 1.2;
    color: var(--text); margin-bottom: 12px; max-width: 360px;
  }

  .detail-artist {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 8px;
  }

  .detail-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.05em; margin-bottom: 60px;
  }

  /* BIG STARS */
  .big-stars { display: flex; gap: 4px; margin-bottom: 16px; }

  .big-star {
    font-size: 56px; cursor: pointer;
    color: var(--border);
    transition: color 0.12s, transform 0.12s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    padding: 6px; line-height: 1;
  }
  .big-star.filled { color: var(--accent-music); }
  .big-star.filled.film-star { color: var(--accent-film); }
  .big-star:active { transform: scale(1.3); }

  .star-hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-dim);
    margin-bottom: 56px; min-height: 1.2em;
  }

  .detail-actions { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; }

  .detail-btn {
    padding: 16px; font-family: 'DM Mono', monospace;
    font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; border: 1px solid var(--border); transition: all 0.2s;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation; background: none;
  }
  .detail-btn.secondary { color: var(--text-dim); }
  .detail-btn.secondary:hover { color: var(--text); border-color: var(--text-dim); }
  .detail-btn.danger { color: #c47070; border-color: #7a3535; }
  .detail-btn.danger:hover { background: #1a1010; }

  /* ============ MODAL ============ */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); z-index: 100;
    align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal { background: var(--surface); border: 1px solid var(--border); padding: 36px; width: 480px; max-width: 90vw; max-height: 85vh; overflow-y: auto; }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 400; margin-bottom: 24px; color: var(--text); }
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
  .form-input, .form-select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
  .form-input:focus, .form-select:focus { border-color: var(--text-dim); }
  .form-select option { background: var(--surface); }
  .modal-actions { display: flex; gap: 10px; margin-top: 28px; justify-content: flex-end; }

  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 10px 22px; font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
  .btn-cancel:hover { color: var(--text); border-color: var(--text-dim); }
  .btn-save { background: var(--accent-music); border: 1px solid var(--accent-music); color: #0e0e0e; padding: 10px 22px; font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; font-weight: 500; }
  .btn-save.film { background: var(--accent-film); border-color: var(--accent-film); }
  .btn-save:hover { opacity: 0.85; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .empty-state { text-align: center; padding: 60px 0; color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 0.75rem; letter-spacing: 0.08em; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  @media (max-width: 600px) {
    header, main { padding-left: 20px; padding-right: 20px; }
    h1 { font-size: 1.8rem; }
    .tab { padding: 12px 18px; font-size: 0.68rem; }
    .item-actions { opacity: 1; }
    .big-star { font-size: 46px; padding: 8px 5px; }
    .detail-title { font-size: 1.7rem; }
    .detail-body { padding: 40px 20px 40px; }
  }
</style>
</head>
<body>

<!-- ============ LIST VIEW ============ -->
<div class="view active" id="view-list">
  <header>
    <div class="header-top">
      <h1>O Meu Arquivo</h1>
      <span class="header-subtitle">Música & Cinema</span>
    </div>
    <div class="tabs">
      <button class="tab active-music" onclick="switchTab('music')" id="tab-music">
        ♫ Música <span class="tab-count" id="music-tab-count"></span>
      </button>
      <button class="tab" onclick="switchTab('film')" id="tab-film">
        ◈ Filmes <span class="tab-count" id="film-tab-count"></span>
      </button>
    </div>
  </header>

  <main>
    <div class="tab-panel active" id="panel-music">
      <div class="controls">
        <input type="text" class="search-box" placeholder="Pesquisar álbum ou artista…" oninput="filterItems('music', this.value)" id="search-music">
        <button class="filter-btn active" onclick="setFilter('music','all',this)">Todos</button>
        <button class="filter-btn" onclick="setFilter('music','pending',this)">Por ouvir</button>
        <button class="filter-btn" onclick="setFilter('music','done',this)">Ouvidos</button>
        <button class="add-btn" onclick="openModal('music')">+ Adicionar</button>
      </div>
      <div class="stats-bar" id="stats-music"></div>
      <div id="music-list"></div>
    </div>

    <div class="tab-panel" id="panel-film">
      <div class="controls">
        <input type="text" class="search-box" placeholder="Pesquisar filme ou realizador…" oninput="filterItems('film', this.value)" id="search-film">
        <button class="filter-btn active" onclick="setFilter('film','all',this)">Todos</button>
        <button class="filter-btn" onclick="setFilter('film','pending',this)">Por ver</button>
        <button class="filter-btn" onclick="setFilter('film','done',this)">Vistos</button>
        <button class="add-btn film-mode" onclick="openModal('film')">+ Adicionar</button>
      </div>
      <div class="stats-bar" id="stats-film"></div>
      <div id="film-list"></div>
    </div>
  </main>
</div>

<!-- ============ DETAIL VIEW ============ -->
<div class="view" id="view-detail">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <span class="detail-header-title" id="detail-header-label">Detalhe</span>
  </div>
  <div class="detail-body">
    <div class="detail-badge" id="detail-badge"></div>
    <div class="detail-title"  id="detail-title"></div>
    <div class="detail-artist" id="detail-artist"></div>
    <div class="detail-meta"   id="detail-meta"></div>
    <div class="big-stars" id="detail-stars"></div>
    <div class="star-hint"  id="star-hint">Toca para avaliar</div>
    <div class="detail-actions">
      <button class="detail-btn secondary" id="detail-btn-unmark" onclick="detailUnmark()">Marcar como não ouvido</button>
      <button class="detail-btn secondary" onclick="detailEdit()">Editar</button>
      <button class="detail-btn danger"    onclick="detailDelete()">Apagar</button>
    </div>
  </div>
</div>

<!-- ============ MODAL ============ -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2 id="modal-title">Adicionar</h2>
    <div class="form-group">
      <label class="form-label" id="label-title">Título</label>
      <input type="text" class="form-input" id="input-title">
    </div>
    <div class="form-group">
      <label class="form-label" id="label-artist">Artista / Banda</label>
      <input type="text" class="form-input" id="input-artist">
    </div>
    <div class="form-group">
      <label class="form-label">Década / Categoria</label>
      <input type="text" class="form-input" id="input-decade" placeholder="ex: Anos 80, 2010s…">
    </div>
    <div class="form-group">
      <label class="form-label">Género / Estilo</label>
      <input type="text" class="form-input" id="input-genre" placeholder="ex: Rock, Drama…">
    </div>
    <div class="form-group" id="group-mediatype" style="display:none">
      <label class="form-label">Tipo</label>
      <select class="form-select" id="input-mediatype">
        <option value="filme">Filme</option>
        <option value="serie">Série</option>
        <option value="curta">Curta-metragem</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btn-save-modal" onclick="saveItem()">Guardar</button>
    </div>
  </div>
</div>

let musicItems = [], filmItems = [];
let nextMusicId = 1, nextFilmId = 1;
let currentFilter = { music: 'all', film: 'all' };
let currentSearch  = { music: '', film: '' };
let modalMode = 'add', modalType = 'music', editingId = null;
let currentTab = 'music';
let detailType = null, detailId = null;

function init() {
  const sm = localStorage.getItem('archive_music');
  const sf = localStorage.getItem('archive_films');
  musicItems  = sm ? JSON.parse(sm) : MUSIC_DATA.map(a => ({...a, done:false, rating:0}));
  filmItems   = sf ? JSON.parse(sf) : [];
  nextMusicId = parseInt(localStorage.getItem('archive_nextMusicId') || musicItems.length + 1);
  nextFilmId  = parseInt(localStorage.getItem('archive_nextFilmId')  || 1);
  render('music'); render('film');
  updateStats('music'); updateStats('film');
  updateTabCounts();
}

function save() {
  localStorage.setItem('archive_music', JSON.stringify(musicItems));
  localStorage.setItem('archive_films', JSON.stringify(filmItems));
  localStorage.setItem('archive_nextMusicId', nextMusicId);
  localStorage.setItem('archive_nextFilmId',  nextFilmId);
}

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-music','active-film'));
  document.getElementById(`tab-${tab}`).classList.add(`active-${tab}`);
}

function updateTabCounts() {
  document.getElementById('music-tab-count').textContent = musicItems.length ? `${musicItems.filter(i=>i.done).length}/${musicItems.length}` : '';
  document.getElementById('film-tab-count').textContent  = `${filmItems.filter(i=>i.done).length}/${filmItems.length}`;
}

function getItems(t) { return t==='music' ? musicItems : filmItems; }

function filterList(type) {
  const items = getItems(type), filter = currentFilter[type], search = currentSearch[type].toLowerCase();
  return items.filter(item => {
    const mf = filter==='all' || (filter==='done' ? item.done : !item.done);
    const ms = !search || item.title.toLowerCase().includes(search) || item.artist.toLowerCase().includes(search) || (item.genre||'').toLowerCase().includes(search);
    return mf && ms;
  });
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function ratingStars(r) { return r ? '★'.repeat(r)+'☆'.repeat(5-r) : ''; }

function renderItem(item, type) {
  const dc = item.done ? 'done' : '';
  const rh = item.done && item.rating ? `<span class="rating-display${type==='film'?' film':''}">${ratingStars(item.rating)}</span>` : '';
  const mb = (type==='film' && item.mediaType) ? `<span class="media-type ${item.mediaType}">${item.mediaType==='serie'?'série':item.mediaType==='curta'?'curta':'filme'}</span>` : '';
  return `<div class="item-row ${dc}" onclick="handleRowClick('${type}',${item.id},event)">
    <div class="check-area"><div class="check-circle"><span class="checkmark">✓</span></div></div>
    <div class="item-content">
      <div class="item-title">${escHtml(item.title)}</div>
      <div class="item-artist">${escHtml(item.artist)}</div>
    </div>
    <div class="item-right">
      ${mb}${rh}
      <div class="item-actions" onclick="event.stopPropagation()">
        <button class="action-btn" onclick="openEditModal('${type}',${item.id})">editar</button>
        <button class="action-btn delete" onclick="deleteItem('${type}',${item.id})">×</button>
      </div>
    </div>
  </div>`;
}

function render(type) {
  const container = document.getElementById(`${type}-list`);
  const filtered  = filterList(type);
  const decades   = [...new Set(filtered.map(i => i.decade))];

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state">${currentSearch[type]?'Sem resultados.':type==='film'?'Ainda sem filmes. Adiciona o primeiro!':'Sem resultados.'}</div>`;
    updateStats(type); updateTabCounts(); return;
  }

  container.innerHTML = decades.map(decade => {
    const di  = filtered.filter(i => i.decade === decade);
    const key = decade.replace(/\s/g,'-').replace(/[^a-zA-Z0-9-]/g,'_');
    return `<div class="decade-section">
      <div class="decade-header" onclick="toggleDecade('${decade.replace(/'/g,"\\'")}',this)">
        <span class="decade-title">${decade}</span>
        <div class="decade-line"></div>
        <span class="decade-badge">${di.filter(i=>i.done).length}/${di.length}</span>
        <span class="decade-toggle">▾</span>
      </div>
      <div class="items-grid" id="decade-${key}">${di.map(i=>renderItem(i,type)).join('')}</div>
    </div>`;
  }).join('');

  updateStats(type); updateTabCounts();
}

function toggleDecade(decade, el) {
  const key  = decade.replace(/\s/g,'-').replace(/[^a-zA-Z0-9-]/g,'_');
  const grid = document.getElementById(`decade-${key}`);
  const tog  = el.querySelector('.decade-toggle');
  if (grid) { const h = grid.style.display==='none'; grid.style.display = h?'':'none'; tog.classList.toggle('collapsed',!h); }
}

function handleRowClick(type, id, event) {
  if (event.target.closest('.item-actions')) return;
  const items = getItems(type);
  const item  = items.find(i => i.id === id);
  if (!item) return;
  if (!item.done) { item.done = true; save(); render(type); }
  openDetail(type, id);
}

// ============ DETAIL ============
function openDetail(type, id) {
  const item = getItems(type).find(i => i.id === id);
  if (!item) return;
  detailType = type; detailId = id;
  const isFilm = type === 'film';

  document.getElementById('detail-header-label').textContent = isFilm ? 'Cinema' : 'Música';
  document.getElementById('detail-badge').textContent  = item.genre || '';
  document.getElementById('detail-title').textContent  = item.title;
  document.getElementById('detail-artist').textContent = item.artist;
  const mp = [item.decade, item.mediaType ? (item.mediaType==='serie'?'Série':item.mediaType==='curta'?'Curta':'Filme') : ''].filter(Boolean);
  document.getElementById('detail-meta').textContent = mp.join(' · ');
  document.getElementById('detail-btn-unmark').textContent = isFilm ? 'Marcar como não visto' : 'Marcar como não ouvido';

  renderDetailStars(item, type);
  showView('view-detail');
}

function renderDetailStars(item, type) {
  const r = item.rating || 0;
  const fc = type === 'film' ? 'film-star' : '';
  const labels = ['','1 estrela','2 estrelas','3 estrelas','4 estrelas','5 estrelas'];
  document.getElementById('detail-stars').innerHTML = [1,2,3,4,5].map(i =>
    `<span class="big-star ${i<=r?'filled':''} ${fc}"
      onclick="detailSetRating(${i})"
      onmouseenter="previewStars(${i},'${type}')"
      onmouseleave="resetStarPreview('${type}')">★</span>`
  ).join('');
  document.getElementById('star-hint').textContent = r ? labels[r] : 'Toca para avaliar';
}

function previewStars(n, type) {
  document.querySelectorAll('.big-star').forEach((s,i) => {
    s.classList.toggle('filled', i < n);
    s.classList.toggle('film-star', type === 'film');
  });
}

function resetStarPreview(type) {
  const item = getItems(type).find(i => i.id === detailId);
  if (item) renderDetailStars(item, type);
}

function detailSetRating(n) {
  const item = getItems(detailType).find(i => i.id === detailId);
  if (!item) return;
  item.rating = (item.rating === n) ? 0 : n;
  save(); renderDetailStars(item, detailType); render(detailType);
}

function detailUnmark() {
  const item = getItems(detailType).find(i => i.id === detailId);
  if (!item) return;
  item.done = false; item.rating = 0;
  save(); render(detailType); closeDetail();
}

function detailEdit()   { closeDetail(); openEditModal(detailType, detailId); }

function detailDelete() {
  if (!confirm('Apagar este item?')) return;
  if (detailType === 'music') musicItems = musicItems.filter(i => i.id !== detailId);
  else filmItems = filmItems.filter(i => i.id !== detailId);
  save(); render(detailType); closeDetail();
}

function closeDetail() { showView('view-list'); detailType = null; detailId = null; }

// ============ FILTER / SEARCH ============
function setFilter(type, filter, btn) {
  currentFilter[type] = filter;
  document.getElementById(`panel-${type}`).querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(type);
}

function filterItems(type, value) { currentSearch[type] = value; render(type); }

// ============ STATS ============
function updateStats(type) {
  const items = getItems(type), total = items.length, done = items.filter(i=>i.done).length;
  const pct = total ? Math.round(done/total*100) : 0;
  const c = type==='music'?'music':'film', label = type==='music'?'álbuns ouvidos':'filmes vistos', verb = type==='music'?'ouvir':'ver';
  document.getElementById(`stats-${type}`).innerHTML = `
    <div class="stat"><span class="stat-num ${c}">${done}</span><span class="stat-label">${label}</span></div>
    <div class="stat"><span class="stat-num" style="color:var(--text-dim)">${total-done}</span><span class="stat-label">por ${verb}</span></div>
    <div class="stat"><span class="stat-num" style="color:var(--text-dim)">${pct}%</span><span class="stat-label">concluído</span></div>
    <div class="progress-bar"><div class="progress-fill ${c}" style="width:${pct}%"></div></div>`;
}

// ============ DELETE FROM LIST ============
function deleteItem(type, id) {
  if (!confirm('Apagar este item?')) return;
  if (type==='music') musicItems = musicItems.filter(i=>i.id!==id);
  else filmItems = filmItems.filter(i=>i.id!==id);
  save(); render(type);
}

// ============ MODAL ============
function openModal(type) {
  modalMode='add'; modalType=type; editingId=null;
  const isFilm = type==='film';
  document.getElementById('modal-title').textContent      = isFilm?'Adicionar Filme':'Adicionar Álbum';
  document.getElementById('label-title').textContent      = isFilm?'Título do Filme':'Título do Álbum';
  document.getElementById('label-artist').textContent     = isFilm?'Realizador / Elenco':'Artista / Banda';
  document.getElementById('input-title').value            = '';
  document.getElementById('input-artist').value           = '';
  document.getElementById('input-decade').value           = '';
  document.getElementById('input-genre').value            = '';
  document.getElementById('group-mediatype').style.display = isFilm?'':'none';
  document.getElementById('input-mediatype').value        = 'filme';
  document.getElementById('btn-save-modal').className     = `btn-save${isFilm?' film':''}`;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('input-title').focus();
}

function openEditModal(type, id) {
  const item = getItems(type).find(i=>i.id===id);
  if (!item) return;
  modalMode='edit'; modalType=type; editingId=id;
  const isFilm = type==='film';
  document.getElementById('modal-title').textContent      = isFilm?'Editar Filme':'Editar Álbum';
  document.getElementById('label-title').textContent      = isFilm?'Título do Filme':'Título do Álbum';
  document.getElementById('label-artist').textContent     = isFilm?'Realizador / Elenco':'Artista / Banda';
  document.getElementById('input-title').value            = item.title;
  document.getElementById('input-artist').value           = item.artist;
  document.getElementById('input-decade').value           = item.decade||'';
  document.getElementById('input-genre').value            = item.genre||'';
  document.getElementById('group-mediatype').style.display = isFilm?'':'none';
  document.getElementById('input-mediatype').value        = item.mediaType||'filme';
  document.getElementById('btn-save-modal').className     = `btn-save${isFilm?' film':''}`;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('input-title').focus();
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target===document.getElementById('modal-overlay')) closeModal(); }

function saveItem() {
  const title = document.getElementById('input-title').value.trim();
  const artist = document.getElementById('input-artist').value.trim();
  const decade = document.getElementById('input-decade').value.trim();
  const genre  = document.getElementById('input-genre').value.trim();
  const mediaType = document.getElementById('input-mediatype').value;
  if (!title) { document.getElementById('input-title').focus(); return; }

  if (modalMode==='add') {
    const newItem = { id: modalType==='music'?nextMusicId++:nextFilmId++, title, artist, decade: decade||'Sem categoria', genre, done:false, rating:0, ...(modalType==='film'?{mediaType}:{}) };
    if (modalType==='music') musicItems.push(newItem); else filmItems.push(newItem);
  } else {
    const item = getItems(modalType).find(i=>i.id===editingId);
    if (item) { item.title=title; item.artist=artist; item.decade=decade||item.decade; item.genre=genre; if(modalType==='film') item.mediaType=mediaType; }
  }
  save(); render(modalType); closeModal();
}

document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeModal(); if(detailType) closeDetail(); }
  if (e.key==='Enter' && document.getElementById('modal-overlay').classList.contains('open') && document.activeElement.tagName!=='BUTTON') saveItem();
});

init();
</script>
</body>
</html>
