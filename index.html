<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Meu Arquivo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent-music: #c8a96e;
    --accent-film: #7eb8c8;
    --text: #e8e4dc;
    --text-dim: #7a7570;
    --done: #4a6741;
    --done-text: #8fbf84;
    --tag-bg: #252525;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 40px 40px 0;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 32px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .header-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
  }

  .tab {
    padding: 14px 32px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    user-select: none;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tab:hover { color: var(--text); }

  .tab.active-music {
    color: var(--accent-music);
    border-bottom-color: var(--accent-music);
  }

  .tab.active-film {
    color: var(--accent-film);
    border-bottom-color: var(--accent-film);
  }

  .tab-count {
    font-size: 0.65rem;
    opacity: 0.7;
  }

  /* MAIN */
  main {
    padding: 32px 40px;
    max-width: 1100px;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--text-dim); }
  .search-box::placeholder { color: var(--text-dim); }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--text-dim);
  }

  .add-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }

  .add-btn:hover {
    border-color: var(--accent-music);
    color: var(--accent-music);
  }

  .add-btn.film-mode:hover {
    border-color: var(--accent-film);
    color: var(--accent-film);
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 24px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    line-height: 1;
    font-weight: 700;
  }

  .stat-num.music { color: var(--accent-music); }
  .stat-num.film { color: var(--accent-film); }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    transition: width 0.4s ease;
  }

  .progress-fill.music { background: var(--accent-music); }
  .progress-fill.film { background: var(--accent-film); }

  /* DECADE SECTION */
  .decade-section {
    margin-bottom: 36px;
  }

  .decade-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 14px;
    cursor: pointer;
    user-select: none;
  }

  .decade-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    font-style: italic;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .decade-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .decade-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .decade-toggle {
    font-size: 0.7rem;
    color: var(--text-dim);
    transition: transform 0.2s;
  }

  .decade-toggle.collapsed { transform: rotate(-90deg); }

  /* ITEMS GRID */
  .items-grid {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .item-row {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid transparent;
    transition: all 0.15s;
    cursor: pointer;
    position: relative;
    group: true;
  }

  .item-row:hover {
    border-color: var(--border);
    background: var(--surface2);
  }

  .item-row.done {
    opacity: 0.55;
  }

  .item-row.done .item-title {
    text-decoration: line-through;
    color: var(--text-dim);
  }

  .item-row.done .item-artist {
    color: var(--text-dim);
  }

  /* CHECKBOX */
  .check-area {
    width: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .check-circle {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .item-row:hover .check-circle {
    border-color: var(--text-dim);
  }

  .item-row.done .check-circle {
    background: var(--done);
    border-color: var(--done);
  }

  .checkmark {
    display: none;
    color: var(--done-text);
    font-size: 10px;
    font-weight: bold;
  }

  .item-row.done .checkmark { display: block; }

  /* ITEM CONTENT */
  .item-content {
    flex: 1;
    min-width: 0;
    padding: 0 12px;
  }

  .item-title {
    font-size: 0.88rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s;
  }

  .item-artist {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.02em;
  }

  .item-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--tag-bg);
    color: var(--text-dim);
    padding: 3px 8px;
    margin-right: 8px;
    flex-shrink: 0;
  }

  /* STAR RATING */
  .star-rating {
    display: flex;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
    margin-right: 8px;
  }

  .star {
    font-size: 13px;
    cursor: pointer;
    color: var(--border);
    transition: color 0.15s, transform 0.1s;
    line-height: 1;
    user-select: none;
  }

  .star.filled { color: var(--accent-music); }
  .star.filled.film-star { color: var(--accent-film); }

  .star:hover { transform: scale(1.2); }

  .item-row:not(.done) .star-rating { opacity: 0.3; pointer-events: none; }
  .item-row.done .star-rating { opacity: 1; pointer-events: auto; }

  /* MEDIA TYPE BADGE */
  .media-type {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border: 1px solid;
    flex-shrink: 0;
    margin-right: 6px;
  }

  .media-type.filme { color: var(--accent-film); border-color: var(--accent-film); opacity: 0.7; }
  .media-type.serie { color: #b87ec8; border-color: #b87ec8; opacity: 0.7; }
  .media-type.curta { color: #c8b17e; border-color: #c8b17e; opacity: 0.7; }

  /* ACTION BUTTONS (shown on hover) */
  .item-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .item-row:hover .item-actions { opacity: 1; }

  .action-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 8px;
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .action-btn:hover {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--text-dim);
  }

  .action-btn.delete:hover {
    border-color: #7a3535;
    color: #c47070;
    background: #1a1010;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 36px;
    width: 480px;
    max-width: 90vw;
    max-height: 85vh;
    overflow-y: auto;
  }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 400;
    margin-bottom: 24px;
    color: var(--text);
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .form-input, .form-select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus { border-color: var(--text-dim); }

  .form-select option { background: var(--surface); }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 28px;
    justify-content: flex-end;
  }

  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 22px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { color: var(--text); border-color: var(--text-dim); }

  .btn-save {
    background: var(--accent-music);
    border: 1px solid var(--accent-music);
    color: #0e0e0e;
    padding: 10px 22px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }

  .btn-save.film { background: var(--accent-film); border-color: var(--accent-film); }
  .btn-save:hover { opacity: 0.85; }

  /* TAB PANELS */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 0;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  /* Responsive */
  @media (max-width: 600px) {
    header, main { padding-left: 20px; padding-right: 20px; }
    h1 { font-size: 1.8rem; }
    .item-tag { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>O Meu Arquivo</h1>
    <span class="header-subtitle">Música & Cinema</span>
  </div>
  <div class="tabs">
    <button class="tab active-music" onclick="switchTab('music')" id="tab-music">
      ♫ Música <span class="tab-count" id="music-tab-count"></span>
    </button>
    <button class="tab" onclick="switchTab('film')" id="tab-film">
      ◈ Filmes <span class="tab-count" id="film-tab-count"></span>
    </button>
  </div>
</header>

<main>

  <!-- MUSIC PANEL -->
  <div class="tab-panel active" id="panel-music">
    <div class="controls">
      <input type="text" class="search-box" placeholder="Pesquisar álbum ou artista…" oninput="filterItems('music', this.value)" id="search-music">
      <button class="filter-btn active" onclick="setFilter('music','all',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('music','pending',this)">Por ouvir</button>
      <button class="filter-btn" onclick="setFilter('music','done',this)">Ouvidos</button>
      <button class="add-btn" onclick="openModal('music')">+ Adicionar</button>
    </div>

    <div class="stats-bar" id="stats-music">
      <!-- filled by JS -->
    </div>

    <div id="music-list"></div>
  </div>

  <!-- FILM PANEL -->
  <div class="tab-panel" id="panel-film">
    <div class="controls">
      <input type="text" class="search-box" placeholder="Pesquisar filme ou realizador…" oninput="filterItems('film', this.value)" id="search-film">
      <button class="filter-btn active" onclick="setFilter('film','all',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('film','pending',this)">Por ver</button>
      <button class="filter-btn" onclick="setFilter('film','done',this)">Vistos</button>
      <button class="add-btn film-mode" onclick="openModal('film')">+ Adicionar</button>
    </div>

    <div class="stats-bar" id="stats-film">
      <!-- filled by JS -->
    </div>

    <div id="film-list"></div>
  </div>

</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2 id="modal-title">Adicionar</h2>
    <div class="form-group">
      <label class="form-label" id="label-title">Título</label>
      <input type="text" class="form-input" id="input-title" placeholder="">
    </div>
    <div class="form-group">
      <label class="form-label" id="label-artist">Artista / Realizador</label>
      <input type="text" class="form-input" id="input-artist" placeholder="">
    </div>
    <div class="form-group">
      <label class="form-label">Década / Categoria</label>
      <input type="text" class="form-input" id="input-decade" placeholder="ex: Anos 80, 2010s…">
    </div>
    <div class="form-group">
      <label class="form-label">Género / Estilo</label>
      <input type="text" class="form-input" id="input-genre" placeholder="ex: Rock, Drama…">
    </div>
    <div class="form-group" id="group-mediatype" style="display:none">
      <label class="form-label">Tipo</label>
      <select class="form-select" id="input-mediatype">
        <option value="filme">Filme</option>
        <option value="serie">Série</option>
        <option value="curta">Curta-metragem</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btn-save-modal" onclick="saveItem()">Guardar</button>
    </div>
  </div>
</div>

let musicItems = [];
let filmItems = [];
let nextMusicId = 1;
let nextFilmId = 1;

// ============================================================
// STATE
// ============================================================
let currentFilter = { music: 'all', film: 'all' };
let currentSearch = { music: '', film: '' };
let modalMode = 'add'; // 'add' or 'edit'
let modalType = 'music'; // 'music' or 'film'
let editingId = null;
let currentTab = 'music';

// ============================================================
// INIT
// ============================================================
function init() {
  const savedMusic = localStorage.getItem('archive_music');
  const savedFilms = localStorage.getItem('archive_films');
  const savedNextMusicId = localStorage.getItem('archive_nextMusicId');
  const savedNextFilmId = localStorage.getItem('archive_nextFilmId');

  if (savedMusic) {
    musicItems = JSON.parse(savedMusic);
  } else {
    musicItems = MUSIC_DATA.map((a,i) => ({...a, id: i+1}));
  }
  nextMusicId = savedNextMusicId ? parseInt(savedNextMusicId) : musicItems.length + 1;

  filmItems = savedFilms ? JSON.parse(savedFilms) : [];
  nextFilmId = savedNextFilmId ? parseInt(savedNextFilmId) : 1;

  render('music');
  render('film');
  updateStats('music');
  updateStats('film');
  updateTabCounts();
}

function save() {
  localStorage.setItem('archive_music', JSON.stringify(musicItems));
  localStorage.setItem('archive_films', JSON.stringify(filmItems));
  localStorage.setItem('archive_nextMusicId', nextMusicId);
  localStorage.setItem('archive_nextFilmId', nextFilmId);
}

// ============================================================
// TABS
// ============================================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');

  document.querySelectorAll('.tab').forEach(t => {
    t.classList.remove('active-music', 'active-film');
  });
  document.getElementById(`tab-${tab}`).classList.add(`active-${tab}`);
}

function updateTabCounts() {
  const md = musicItems.length > 0 ? `${musicItems.filter(i=>i.done).length}/${musicItems.length}` : '';
  const fd = filmItems.length > 0 ? `${filmItems.filter(i=>i.done).length}/${filmItems.length}` : filmItems.length === 0 ? '0' : '';
  document.getElementById('music-tab-count').textContent = md;
  document.getElementById('film-tab-count').textContent = fd;
}

// ============================================================
// RENDER
// ============================================================
function getItems(type) {
  return type === 'music' ? musicItems : filmItems;
}

function getDecades(type) {
  const items = getItems(type);
  const decades = [...new Set(items.map(i => i.decade))];
  return decades;
}

function filterList(type) {
  const items = getItems(type);
  const filter = currentFilter[type];
  const search = currentSearch[type].toLowerCase();

  return items.filter(item => {
    const matchFilter = filter === 'all' || (filter === 'done' ? item.done : !item.done);
    const matchSearch = !search ||
      item.title.toLowerCase().includes(search) ||
      item.artist.toLowerCase().includes(search) ||
      (item.genre || '').toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });
}

function render(type) {
  const container = document.getElementById(`${type}-list`);
  const filtered = filterList(type);
  const decades = [...new Set(filtered.map(i => i.decade))];

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">${currentSearch[type] ? 'Sem resultados.' : type === 'film' ? 'Ainda sem filmes. Adiciona o primeiro!' : 'Sem resultados.'}</div>`;
    return;
  }

  let html = '';
  for (const decade of decades) {
    const decadeItems = filtered.filter(i => i.decade === decade);
    const doneCount = decadeItems.filter(i => i.done).length;
    html += `
      <div class="decade-section">
        <div class="decade-header" onclick="toggleDecade('${decade.replace(/'/g,"\\'")}', this)">
          <span class="decade-title">${decade}</span>
          <div class="decade-line"></div>
          <span class="decade-badge">${doneCount}/${decadeItems.length}</span>
          <span class="decade-toggle">▾</span>
        </div>
        <div class="items-grid" id="decade-${decade.replace(/\s/g,'-').replace(/[^a-zA-Z0-9-]/g,'_')}">
    `;
    for (const item of decadeItems) {
      html += renderItem(item, type);
    }
    html += `</div></div>`;
  }

  container.innerHTML = html;
  updateStats(type);
  updateTabCounts();
}

function renderStars(item, type) {
  const rating = item.rating || 0;
  const starClass = type === 'film' ? 'film-star' : '';
  let html = `<div class="star-rating" onclick="event.stopPropagation()">`;
  for (let i = 1; i <= 5; i++) {
    const filled = i <= rating ? 'filled' : '';
    html += `<span class="star ${filled} ${starClass}" onclick="setRating('${type}', ${item.id}, ${i})" title="${i} estrela${i>1?'s':''}">★</span>`;
  }
  html += `</div>`;
  return html;
}

function renderItem(item, type) {
  const doneClass = item.done ? 'done' : '';
  const mediaTypeBadge = (type === 'film' && item.mediaType)
    ? `<span class="media-type ${item.mediaType}">${item.mediaType === 'serie' ? 'série' : item.mediaType === 'curta' ? 'curta' : 'filme'}</span>`
    : '';
  return `
    <div class="item-row ${doneClass}" id="item-${type}-${item.id}" onclick="toggleDone('${type}', ${item.id}, event)">
      <div class="check-area">
        <div class="check-circle">
          <span class="checkmark">✓</span>
        </div>
      </div>
      <div class="item-content">
        <div class="item-title">${escHtml(item.title)}</div>
        <div class="item-artist">${escHtml(item.artist)}</div>
      </div>
      ${mediaTypeBadge}
      ${item.genre ? `<span class="item-tag">${escHtml(item.genre)}</span>` : ''}
      ${renderStars(item, type)}
      <div class="item-actions" onclick="event.stopPropagation()">
        <button class="action-btn" onclick="openEditModal('${type}', ${item.id})">editar</button>
        <button class="action-btn delete" onclick="deleteItem('${type}', ${item.id})">×</button>
      </div>
    </div>
  `;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleDecade(decade, headerEl) {
  const key = decade.replace(/\s/g,'-').replace(/[^a-zA-Z0-9-]/g,'_');
  const grid = document.getElementById(`decade-${key}`);
  const toggle = headerEl.querySelector('.decade-toggle');
  if (grid) {
    const isHidden = grid.style.display === 'none';
    grid.style.display = isHidden ? '' : 'none';
    toggle.classList.toggle('collapsed', !isHidden);
  }
}

// ============================================================
// STAR RATING
// ============================================================
function setRating(type, id, rating) {
  const items = type === 'music' ? musicItems : filmItems;
  const item = items.find(i => i.id === id);
  if (!item || !item.done) return;
  // clicking the same star again clears the rating
  item.rating = (item.rating === rating) ? 0 : rating;
  save();
  render(type);
}

// ============================================================
// TOGGLE DONE
// ============================================================
function toggleDone(type, id, event) {
  if (event.target.closest('.item-actions')) return;
  const items = type === 'music' ? musicItems : filmItems;
  const item = items.find(i => i.id === id);
  if (item) {
    item.done = !item.done;
    save();
    render(type);
  }
}

// ============================================================
// FILTER / SEARCH
// ============================================================
function setFilter(type, filter, btn) {
  currentFilter[type] = filter;
  const panel = document.getElementById(`panel-${type}`);
  panel.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(type);
}

function filterItems(type, value) {
  currentSearch[type] = value;
  render(type);
}

// ============================================================
// STATS
// ============================================================
function updateStats(type) {
  const items = type === 'music' ? musicItems : filmItems;
  const total = items.length;
  const done = items.filter(i => i.done).length;
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  const color = type === 'music' ? 'music' : 'film';
  const label = type === 'music' ? 'álbuns ouvidos' : 'filmes vistos';

  document.getElementById(`stats-${type}`).innerHTML = `
    <div class="stat">
      <span class="stat-num ${color}">${done}</span>
      <span class="stat-label">${label}</span>
    </div>
    <div class="stat">
      <span class="stat-num" style="color:var(--text-dim)">${total - done}</span>
      <span class="stat-label">por ${type === 'music' ? 'ouvir' : 'ver'}</span>
    </div>
    <div class="stat">
      <span class="stat-num" style="color:var(--text-dim)">${pct}%</span>
      <span class="stat-label">concluído</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill ${color}" style="width:${pct}%"></div>
    </div>
  `;
}

// ============================================================
// MODAL
// ============================================================
function openModal(type) {
  modalMode = 'add';
  modalType = type;
  editingId = null;
  const isFilm = type === 'film';
  document.getElementById('modal-title').textContent = isFilm ? 'Adicionar Filme' : 'Adicionar Álbum';
  document.getElementById('label-title').textContent = isFilm ? 'Título do Filme' : 'Título do Álbum';
  document.getElementById('label-artist').textContent = isFilm ? 'Realizador / Elenco' : 'Artista / Banda';
  document.getElementById('input-title').value = '';
  document.getElementById('input-artist').value = '';
  document.getElementById('input-decade').value = '';
  document.getElementById('input-genre').value = '';
  document.getElementById('group-mediatype').style.display = isFilm ? '' : 'none';
  document.getElementById('input-mediatype').value = 'filme';
  document.getElementById('btn-save-modal').className = `btn-save${isFilm ? ' film' : ''}`;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('input-title').focus();
}

function openEditModal(type, id) {
  const items = type === 'music' ? musicItems : filmItems;
  const item = items.find(i => i.id === id);
  if (!item) return;
  modalMode = 'edit';
  modalType = type;
  editingId = id;
  const isFilm = type === 'film';
  document.getElementById('modal-title').textContent = isFilm ? 'Editar Filme' : 'Editar Álbum';
  document.getElementById('label-title').textContent = isFilm ? 'Título do Filme' : 'Título do Álbum';
  document.getElementById('label-artist').textContent = isFilm ? 'Realizador / Elenco' : 'Artista / Banda';
  document.getElementById('input-title').value = item.title;
  document.getElementById('input-artist').value = item.artist;
  document.getElementById('input-decade').value = item.decade || '';
  document.getElementById('input-genre').value = item.genre || '';
  document.getElementById('group-mediatype').style.display = isFilm ? '' : 'none';
  document.getElementById('input-mediatype').value = item.mediaType || 'filme';
  document.getElementById('btn-save-modal').className = `btn-save${isFilm ? ' film' : ''}`;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('input-title').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function saveItem() {
  const title = document.getElementById('input-title').value.trim();
  const artist = document.getElementById('input-artist').value.trim();
  const decade = document.getElementById('input-decade').value.trim();
  const genre = document.getElementById('input-genre').value.trim();
  const mediaType = document.getElementById('input-mediatype').value;

  if (!title) { document.getElementById('input-title').focus(); return; }

  if (modalMode === 'add') {
    const newItem = {
      id: modalType === 'music' ? nextMusicId++ : nextFilmId++,
      title, artist, decade: decade || 'Sem categoria', genre, done: false, rating: 0,
      ...(modalType === 'film' ? { mediaType } : {})
    };
    if (modalType === 'music') musicItems.push(newItem);
    else filmItems.push(newItem);
  } else {
    const items = modalType === 'music' ? musicItems : filmItems;
    const item = items.find(i => i.id === editingId);
    if (item) {
      item.title = title; item.artist = artist;
      item.decade = decade || item.decade; item.genre = genre;
      if (modalType === 'film') item.mediaType = mediaType;
    }
  }

  save();
  render(modalType);
  closeModal();
}

function deleteItem(type, id) {
  if (!confirm('Tens a certeza que queres apagar este item?')) return;
  if (type === 'music') musicItems = musicItems.filter(i => i.id !== id);
  else filmItems = filmItems.filter(i => i.id !== id);
  save();
  render(type);
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) {
    if (document.activeElement.tagName !== 'BUTTON') saveItem();
  }
});

init();
</script>
</body>
</html>
